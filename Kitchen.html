<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Display System</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --accent: #2980b9;
            --highlight: #3498db;
            --text: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #30363d;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: var(--highlight);
        }

        #orders {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .order-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-top: 5px solid var(--highlight);
        }

        .order-header {
            padding: 15px;
            background: #21262d;
        }

        .order-body {
            padding: 15px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 8px 0;
            border-bottom: 1px solid #30363d;
        }

        .qty-badge {
            color: var(--highlight);
            font-weight: bold;
        }

        .ready-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .ready-btn:hover {
            background: var(--highlight);
        }
    </style>
</head>

<body>

<header>
    <h1>KITCHEN DISPLAY</h1>
</header>

<div id="orders"></div>

<script>

const API = "https://app1-backend-production-7e08.up.railway.app";

// 🔐 AUTH CHECK
const token = localStorage.getItem("token");

if(!token){
    alert("No token");
    window.location.href = "index.html";
}

// 🍽️ LOAD ORDERS
function loadOrders(){

    console.log("TOKEN:", token);

    fetch(API + "/orders", {
        headers: {
            "Authorization": `Bearer ${token}`
        }
    })
    .then(res => {

        if(res.status === 401 || res.status === 403){
            alert("Session expired");
            localStorage.clear();
            window.location.href = "index.html";
            return;
        }

        return res.json();
    })
    .then(data => {

        if(!data) return;

        const container = document.getElementById("orders");
        container.innerHTML = "";

        if(data.length === 0){
            container.innerHTML = "<h2>No Orders</h2>";
            return;
        }

        let tables = {};

        data.forEach(item => {
            let table = item.tableNumber ?? "N/A";

            if(!tables[table]) tables[table] = [];

            tables[table].push({
                name: item.productName,
                qty: item.quantity
            });
        });

        for(let table in tables){

            let div = document.createElement("div");
            div.className = "order-card";

            let productsHTML = tables[table]
                .map(p => `<li>${p.name} <span class="qty-badge">x${p.qty}</span></li>`)
                .join("");

            div.innerHTML = `
                <div class="order-header">
                    <h2>TABLE ${table}</h2>
                </div>
                <div class="order-body">
                    <ul>${productsHTML}</ul>
                </div>
                <button class="ready-btn" onclick="markReady(${table}, this)">
                    READY
                </button>
            `;

            container.appendChild(div);
        }
    })
    .catch(err => console.error(err));
}

// 🔥 DELETE ORDER
function markReady(tableNumber, button){

    const token = localStorage.getItem("token");

    fetch(API + "/orders/table/" + tableNumber, {
        method: "DELETE",
        headers: {
            "Authorization": `Bearer ${token}`
        }
    })
    .then(res => {
        if(!res.ok){
            throw new Error("Delete failed");
        }

        console.log("Deleted table:", tableNumber);

        // 🔥 remove instantly from UI
        const card = button.parentElement;
        card.remove();
    })
    .catch(err => console.error(err));
}

// 🚀 AUTO REFRESH
loadOrders();
setInterval(loadOrders, 3000);

</script>

</body>
</html>
