<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Login</title>
    <style>
        :root {
            --primary: #3498db; /* New Blue */
            --bg: #1a1a1a;
            --card: #2c2c2c;
            --text: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #1e272e 0%, #000 100%);
            color: var(--text);
        }
        .login-box {
            background: var(--card);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-bottom: 4px solid var(--primary);
            width: 320px;
            text-align: center;
        }
        h2 { margin-bottom: 25px; font-weight: 300; letter-spacing: 1px; color: var(--primary); }
        input {
            display: block;
            margin: 15px 0;
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            border-radius: 6px;
            border: 1px solid #444;
            background: #111;
            color: white;
            font-size: 16px;
        }
        input:focus { outline: 2px solid var(--primary); border-color: transparent; }
        button {
            padding: 12px;
            width: 100%;
            background: var(--primary);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>KITCHEN LOGIN</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">SIGN IN</button>
</div>

<script>
/* JS Logic remains exactly the same as previous version */
function login(){
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    fetch("https://app1-backend-production-7e08.up.railway.app/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    })
    .then(res => { if(!res.ok) throw new Error("Wrong credentials"); return res.json(); })
    .then(data => {
        localStorage.setItem("adminId", data.adminId);
        localStorage.setItem("role", data.role);
        if(data.role.toLowerCase() === "admin"){ window.location.href = "Kitchen.html"; }
        else { alert("Only admin allowed"); }
    })
    .catch(err => alert("Λάθος username ή password"));
}
</script>
</body>
</html>
