<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Login</title>
    <style>
        :root {
            --primary: #3498db;
            --bg: #1a1a1a;
            --card: #2c2c2c;
            --text: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #1e272e 0%, #000 100%);
            color: var(--text);
        }
        .login-box {
            background: var(--card);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-bottom: 4px solid var(--primary);
            width: 320px;
            text-align: center;
        }
        h2 { margin-bottom: 25px; font-weight: 300; letter-spacing: 1px; color: var(--primary); }
        input {
            display: block;
            margin: 15px 0;
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            border-radius: 6px;
            border: 1px solid #444;
            background: #111;
            color: white;
            font-size: 16px;
        }
        input:focus { outline: 2px solid var(--primary); border-color: transparent; }
        button {
            padding: 12px;
            width: 100%;
            background: var(--primary);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #2980b9; }
        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
 
<div class="login-box">
    <h2>KITCHEN LOGIN</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <p id="errorMsg" class="error"></p>
    <button onclick="login()">SIGN IN</button>
</div>
 
<script>
function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorMsg = document.getElementById("errorMsg");
 
    errorMsg.style.display = "none";
 
    fetch("https://app1-backend-production-7e08.up.railway.app/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    })
    .then(res => {
        if (!res.ok) throw new Error("Wrong credentials");
        return res.json();
    })
    .then(data => {
        const token = data.token;
 
        //  Αποκωδικοποίηση JWT για έλεγχο ρόλου
        const parts   = token.split(".");
        const payload = JSON.parse(atob(parts[1]));
        const role    = payload.role;
 
        //  Μόνο ADMIN και KITCHEN έχουν πρόσβαση στο web
        if (role !== "ADMIN" && role !== "KITCHEN") {
            errorMsg.textContent = "Δεν έχεις πρόσβαση στο web app. Χρησιμοποίησε το Android app.";
            errorMsg.style.display = "block";
            return;
        }
 
        //  Αποθήκευση token και role
        localStorage.setItem("token", token);
        localStorage.setItem("role", role);
 
        //  Redirect στο kitchen
        window.location.href = "Kitchen.html";
    })
    .catch(() => {
        errorMsg.textContent = "Λάθος username ή password";
        errorMsg.style.display = "block";
    });
}
 
// ✅ Login με Enter
document.addEventListener("keydown", e => {
    if (e.key === "Enter") login();
});
</script>
</body>
</html>
