<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitchen Display System</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --accent: #2980b9;
            --highlight: #3498db;
            --text: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #30363d;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: var(--highlight);
        }

        #orders {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .order-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-top: 5px solid var(--highlight);
        }

        .order-header {
            padding: 15px;
            background: #21262d;
        }

        .order-body {
            padding: 15px;
            flex: 1;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li.product-item {
            padding: 10px 0;
            border-bottom: 1px solid #30363d;
        }

        .product-name {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .qty-badge {
            color: var(--highlight);
            font-weight: bold;
            font-size: 16px;
        }

        .materials-list {
            margin: 6px 0 0 8px;
            padding: 0;
            list-style: none;
        }

        .materials-list li {
            font-size: 13px;
            color: #8b949e;
            padding: 2px 0;
            border-bottom: none;
        }

        .materials-list li::before {
            content: "→ ";
            color: var(--highlight);
        }

        .no-materials {
            font-size: 12px;
            color: #484f58;
            margin-top: 4px;
            margin-left: 8px;
        }

        .ready-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            width: 100%;
        }

        .ready-btn:hover {
            background: var(--highlight);
        }
    </style>
</head>

<body>

<header>
    <h1>KITCHEN DISPLAY</h1>
</header>

<div id="orders"></div>

<script>

const API = "https://app1-backend-production-7e08.up.railway.app";

// 🔐 AUTH CHECK
const token = localStorage.getItem("token");

if (!token) {
    alert("No token");
    window.location.href = "index.html";
}

// 🍽️ LOAD ORDERS
function loadOrders() {

    fetch(API + "/orders", {
        headers: {
            "Authorization": `Bearer ${token}`
        }
    })
    .then(res => {

        if (res.status === 401 || res.status === 403) {
            alert("Session expired");
            localStorage.clear();
            window.location.href = "index.html";
            return;
        }

        return res.json();
    })
    .then(data => {

        if (!data) return;

        const container = document.getElementById("orders");
        container.innerHTML = "";

        if (data.length === 0) {
            container.innerHTML = "<h2>No Orders</h2>";
            return;
        }

        // Group orders by table number
        let tables = {};

        data.forEach(order => {

            let tableNum = order.tableNumber ?? "N/A";

            if (!tables[tableNum]) tables[tableNum] = [];

            // Each order has a list of items
            if (order.items && order.items.length > 0) {

                order.items.forEach(item => {
                    tables[tableNum].push({
                        productName: item.productName,
                        quantity:    item.quantity,
                        materials:   item.materials || []
                    });
                });

            }
        });

        for (let table in tables) {

            let div = document.createElement("div");
            div.className = "order-card";

            // Build product + materials HTML
            let productsHTML = tables[table].map(item => {

                // Build materials list
                let materialsHTML = "";

                if (item.materials.length > 0) {
                    let matItems = item.materials
                        .map(m => `<li>${m.name}</li>`)
                        .join("");
                    materialsHTML = `<ul class="materials-list">${matItems}</ul>`;
                } else {
                    materialsHTML = `<p class="no-materials">No materials</p>`;
                }

                return `
                    <li class="product-item">
                        <div class="product-name">
                            <span>${item.productName}</span>
                            <span class="qty-badge">x${item.quantity}</span>
                        </div>
                        ${materialsHTML}
                    </li>
                `;

            }).join("");

            div.innerHTML = `
                <div class="order-header">
                    <h2>TABLE ${table}</h2>
                </div>
                <div class="order-body">
                    <ul>${productsHTML}</ul>
                </div>
                <button class="ready-btn" onclick="markReady(${table}, this)">
                    READY
                </button>
            `;

            container.appendChild(div);
        }
    })
    .catch(err => console.error(err));
}

// 🔥 DELETE ORDER
function markReady(tableNumber, button) {

    fetch(API + "/orders/table/" + tableNumber, {
        method: "DELETE",
        headers: {
            "Authorization": `Bearer ${token}`
        }
    })
    .then(res => {
        if (!res.ok) throw new Error("Delete failed");
        const card = button.parentElement;
        card.remove();
    })
    .catch(err => console.error(err));
}

// 🚀 AUTO REFRESH
loadOrders();
setInterval(loadOrders, 3000);

</script>

</body>
</html>
