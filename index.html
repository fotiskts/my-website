<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #222;
            color: white;
        }

        .login-box {
            background: #333;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            display: block;
            margin: 10px 0;
            padding: 10px;
            width: 200px;
        }

        button {
            padding: 10px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Kitchen Login</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>
function login(){

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    fetch("https://app1-backend-production-7e08.up.railway.app/auth/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    })
    .then(res => {
        if(!res.ok){
            throw new Error("Wrong credentials");
        }
        return res.json();
    })
    .then(data => {
        

    
        localStorage.setItem("adminId", data.adminId);
        localStorage.setItem("role", data.role);

      if(data.role.toLowerCase() === "admin"){
            window.location.href = "Kitchen.html";
    }else {
        alert("Only admin allowed");
    }

    })
    .catch(err => {
        alert("Λάθος username ή password");
    });
}
</script>

</body>
</html>
